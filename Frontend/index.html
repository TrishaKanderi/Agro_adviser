<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroAdviser | AI Crop Care</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <section id="landing" class="page active">
        <div class="hero-content">
            <h1>Agro<span class="accent">Adviser</span></h1>
            <p>Smart AI Detection for Healthier Crops</p>
            <div class="btn-group">
                <button class="btn-primary" onclick="showPage('home')">Get Started</button>
                <button class="btn-secondary" onclick="showPage('about')">About</button>
            </div>
        </div>
    </section>

    <section id="home" class="page">
        <nav class="glass-nav">
            <div class="logo" onclick="showPage('landing')">AgroAdviser</div>
            <div class="nav-settings">
                <select id="global-lang" onchange="updateLang()">
                    <option value="en">English</option>
                    <option value="te">Telugu</option>
                </select>
                <button class="nav-link" onclick="showPage('help')">Help</button>
            </div>
        </nav>

        <div class="container">
            <div class="upload-card">
                <input type="file" id="imageInput" hidden accept="image/*">
                <div class="drop-zone" onclick="document.getElementById('imageInput').click()">
                    <p>Click or Drag Leaf Image Here</p>
                    <img id="preview" src="#" alt="Preview" style="display:none;">
                </div>
                <button id="predictBtn" class="btn-action">Predict Disease</button>
            </div>

            <div id="resultArea" class="result-card hidden">
                <h2 id="diseaseName"></h2>
                <div id="cureList" class="cure-content"></div>
                <button id="listenBtn" class="btn-audio">🔊 Listen to Cure</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
